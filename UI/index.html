<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Server Select</title>

    <style>
        body {
            margin: 0;
            font-family: monospace;
            background: #0b0b0b;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .panel {
            width: 320px;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
        }

        .server {
            padding: 10px;
            margin: 6px 0;
            background: #151515;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
        }

        .server:hover {
            background: #222;
            border-color: #555;
        }
    </style>
</head>

<body>

<div id="server-list" class="panel">
</div>

<script src="utils/logger.js"></script>
<script src="network.js"></script>

<script>
    const container = document.getElementById("server-list");

    Network.on("connected", err => {
        Logger.log("[WS] Connected to server");

        Network.send({
            type: "list"
        });

        setInterval(() => {
            Network.send({
                type: "list"
            });
        }, 15000);
    });

    Network.on("servers", servers => {
        
        container.innerHTML = "";

        for (const s of servers) {

            const el = document.createElement("div");

            el.className = "server";
            el.textContent = `${s.name}`;

            el.onclick = () => {
                window.location.href = `server.html?sv=${s.id}`;
            };

            container.appendChild(el);
        }
        
    });

    Network.connect();

</script>

</body>

</html>
