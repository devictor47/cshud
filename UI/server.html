    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        body.resizing * {
            user-select: none;
            pointer-events: none;
        }

        body.resizing.res-row {
            cursor: row-resize;
        }

        body.resizing.res-col {
            cursor: col-resize;
        }

        #ui-grid {
            display: grid;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: grid;
            grid-template-rows: 1fr 6px 10rem;
        }

        .resizer {
            user-select: none;
            pointer-events: auto;
            touch-action: none;
            border-radius: 6px;
            position: relative;
        }

        .resizer::before {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            opacity: 0.5;
            pointer-events: none;
            color: #fff;
        }

        .resizer::after {
            content: "";
            position: absolute;
            inset: -4px;
            /* expands clickable area */
        }

        .resizer:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .resizer.row-resizer {
            cursor: row-resize;
        }

        .resizer.row-resizer::before {
            content: "•••";
            letter-spacing: 1px;
            transform: translateY(-15px);
        }

        .resizer.col-resizer {
            cursor: col-resize;
        }

        .resizer.col-resizer::before {
            content: "•\A•\A•";
            line-height: 0.5;
        }

        #stream-grid {
            display: grid;
            grid-template-columns: minmax(0, 260px) 1fr minmax(0, 260px);
            gap: 0.5rem;
            min-height: 0;
            /* IMPORTANT for overflow correctness */
        }

        #chat-grid {
            display: grid;
            /* chat | resizer | chat | resizer | chat */
            grid-template-columns: 1fr 6px 2fr 6px 1fr;
            overflow: hidden;
        }

        #stream-grid>div,
        #chat-grid>div:not(.resizer) {
            border: 1px solid #ff8f00;
            border-radius: 6px;
        }

        #map-column {
            /*background-color: aquamarine;*/
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 0;
            overflow: hidden;
            /* Importante para o grid não explodir */
            position: relative;
        }

        #map-column::before {
            content: "";
            position: absolute;
            /* 2. Expandimos um pouco para evitar bordas brancas no blur */
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            /* 3. Definimos o background aqui */
            background-image: var(--map-bg, url("overviews/loading.png"));
            background-size: cover;
            background-position: center;
            /* 4. Aplicamos o blur apenas nesta camada */
            filter: blur(5px) brightness(40%);
            /* 5. Garantimos que fique atrás de tudo */
            z-index: -1;
        }

        .map-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            /* border: 3px solid red; */
        }

        #map-container {
            height: 100%;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffffff;
            position: relative;
            /*cursor: grab*/
        }

        #map-canvas {
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        #entities-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            z-index: 1;
        }

        .team-column {
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: 0;
            padding-bottom: 6px;
        }

        .team-list {
            padding: 0 6px;
            overflow-y: scroll;
        }

        .team-list>.player-card:not(:first-child) {
            margin-top: 6px;
        }

        #ct-column {
            /*background-color: aqua;*/
        }

        #ct-column .player-card {
            border-color: #016ed0;
            background-color: #060d18;
        }

        #ct-column .hp-bar {
            background: linear-gradient(to left, #016ed0, #000);
        }

        #ct-column .row-3 {
            border-top: 1px solid #016ed0;
        }

        #t-column {
            /*background-color: blanchedalmond;*/
        }

        #t-column .player-card {
            border-color: #ff8f00;
            background-color: #201507;
            text-align: right;
        }

        #t-column .hp-bar {
            background: linear-gradient(to right, #ff8f00, #000);
            transform-origin: right;
        }

        #t-column .row-3 {
            border-top: 1px solid #ff8f00;
        }

        #ct-chat {
            grid-column: 1;
            /*background-color: aqua;*/
        }

        #say-chat {
            grid-column: 3;
            /*background-color: aquamarine;*/
        }

        #t-chat {
            grid-column: 5;
            /*background-color: blanchedalmond;*/
        }

        .stream-grid-header,
        .stream-grid-footer {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stream-grid-footer.timer img {
            position: relative;
            top: 2px;
            margin-right: 4px;
        }

        .stream-grid-header p,
        .stream-grid-footer p {
            margin: .5rem 0;
        }

        .player-card {
            width: 100%;
            min-width: 0;
            height: 92px;
            display: grid;
            box-sizing: border-box;
            grid-template-rows: repeat(3, minmax(0, 1fr));
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            border-radius: 4px;
            color: white;
            padding: 0 4px;
        }

        .row {
            display: grid;
            align-items: center;
            padding: 2px 4px;
        }

        #t-column .row {
            direction: rtl;
        }

        .row-1 {
            grid-template-columns: minmax(0, 1fr) max-content max-content;
            grid-column-gap: 6px;
        }

        .row-1>div {
            min-width: 0;
        }

        #t-column .row-1>div:nth-child(2) {
            order: 2;
            /* kills */
            flex-direction: row-reverse;
        }

        #t-column .row-1>div:nth-child(3) {
            order: 1;
            /* deaths */
            flex-direction: row-reverse;
        }

        .row-1>div:nth-child(2),
        .row-1>div:nth-child(3) {
            display: flex;
            align-items: center;
            gap: 2px;
            justify-content: flex-end;
        }

        .player-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        .row-2 {
            grid-template-columns: auto 1fr;
            column-gap: 6px;
            padding-bottom: 6px;
        }

        .money {
            justify-self: start;
            color: #01ff00;
            font-weight: 501;
            display: flex;
            gap: 4px;
        }

        #t-column .money {
            flex-direction: row-reverse;
        }

        .money img {
            width: auto;
            height: 19px;
            filter: brightness(100%) sepia(100%) hue-rotate(50deg) saturate(600%) drop-shadow(0 0 4px rgb(60, 255, 0));
        }

        .money span {
            position: relative;
            top: -2px;
        }

        .items {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            align-items: center;
            flex-direction: row-reverse;
            justify-content: flex-start;
        }

        .items img {
            max-width: 24px;
            height: 19px;
        }

        .items img.c4 {
            order: 5;
            filter: drop-shadow(0 0 4px rgb(253, 192, 135));
        }

        .items img.kit {
            order: 5;
            filter: brightness(100%) sepia(100%) hue-rotate(50deg) saturate(600%) drop-shadow(0 0 4px rgb(60, 255, 0));
        }

        .items img.he {
            order: 1;
            filter: brightness(90%) sepia(100%) hue-rotate(300deg) saturate(300%)
        }

        .items img.fb {
            order: 2;
            filter: brightness(100%) sepia(100%) hue-rotate(22deg) saturate(300%)
        }

        .items img.sg {
            order: 3;
            filter: brightness(100%) sepia(100%) hue-rotate(50deg) saturate(300%)
        }

        .row-3 {
            --hp: 100;
            position: relative;
            grid-template-columns: auto auto auto;
            column-gap: 6px;
            margin-left: -4px;
            margin-right: -4px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .row-3>* {
            position: relative;
            z-index: 1;
        }

        .hp {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #ff5252;
            font-weight: 501;
        }

        .hp img {
            max-width: 24px;
            height: 19px;
        }

        .hp img.hp-ico {
            filter: brightness(90%) sepia(100%) hue-rotate(300deg) saturate(300%);
        }

        .hp img.armor {
            filter: brightness(100%) sepia(100%) hue-rotate(180deg) saturate(700%) drop-shadow(0 0 4px rgb(169, 255, 255));
        }

        .hp-bar {
            position: absolute;
            inset: 0;
            z-index: 0;
            transform-origin: left;
            /*TODO - transform: scaleX(var(--hp)); -- Change to this after moving the /100 to JS */
            transform: scaleX(var(--hp));
            background: linear-gradient(to left, #f00, #270000);
            opacity: 0.8;
            transition: transform 0.15s linear;
            border-radius: 0px 0px 4px 0px;
        }

        .primary,
        .secondary {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
        }

        #t-column .primary.active-wpn,
        #t-column .secondary.active-wpn {
            filter: drop-shadow(0 0 4px #ff0000);
        }

        #ct-column .primary.active-wpn,
        #ct-column .secondary.active-wpn {
            filter: drop-shadow(0 0 4px #ffe300);
        }

        .icon {
            width: auto;
            height: 24px;
            display: block;
            fill: currentColor;
            flex-shrink: 0;
            /* filter: drop-shadow(0 0 2px currentColor); */
            overflow: visible;
        }

        .icon.inactive {
           opacity: 0.35;
           filter: none;
        }

        #t-column .icon {
            transform: scaleX(-1);
        }

        .chat {
            padding: 8px;
            box-sizing: border-box;
            font-family: monospace;
            overflow-y: auto;
        }

        .chat .line {
            padding: 4px;
            line-height: 1.3;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .chat .line:first-child {
            margin-bottom: -2px;
        }

        .chat .line-time {
            font-weight: bold;
        }

        .chat .player {
            font-weight: bold;
            text-shadow:
                -1px -1px 0 black,
                 1px -1px 0 black,
                -1px  1px 0 black,
                 1px  1px 0 black;
        }

        .chat .player.ct {
            color: #4db3ff;
        }

        .chat .player.t {
            color: #ffb347;
        }

        .chat .emphasis {
            font-weight: bold;
        }

        .chat .kill-weapon {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .chat .kill-weapon svg {
            width: auto;
            height: 16px;
            flex-shrink: 0;
        }

        #overlay-banner {

            position: fixed;

            top: 1rem;
            left: 50%;

            transform: translateX(-50%);

            z-index: 10000;

            padding: 0.75rem 2rem;

            border-radius: 0.5rem;

            background:
                linear-gradient(
                    to right,
                    rgba(0,0,0,0.85),
                    rgba(40,40,40,0.95),
                    rgba(0,0,0,0.85)
                );

            border: 1px solid #ff8f00;

            font-size: 1.5rem;
            font-weight: bold;

            opacity: 0;
            pointer-events: none;

            transition:
                opacity 0.25s ease,
                transform 0.25s ease;
        }

        #overlay-banner.visible {
            opacity: 1;
        }

        #overlay-banner > span {
            opacity: 0;
        }

        #overlay-banner > .visible {
            opacity: 1;
        }

        .player-card.blind-hold {
            transition: none !important;
            background-color: #fff !important;
        }

    </style>

</head>

    <script>

        function getServerId() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get("sv");
            const id = Number(raw);

            if (!raw || !Number.isFinite(id) || id <= 0) {
                console.warn("[WS] No valid server id in URL params.");
                return null;
            }

            return id;
        }

        (async function main() {

            await IconAssets.Init();
            const serverId = getServerId();

            if (!serverId) {
                Logger.error("No valid server id provided.");
                return;
            }

            Network.on("connected", err => {
                Logger.log("[WS] Connected to server");
                Network.send({
                    type: "subscribe",
                    server: serverId
                }); 
            });

            Network.on("subscribed", svId => {

                Logger.log(`[WS] Subscribed to server ${svId}`);

                Network.send({
                    type: "full_state"
                });

                Logger.log("Starting RAF...");
                requestAnimationFrame(reFrame);
            });

            Network.on("tick", tick => {
                State.time.receivedAt = performance.now();
                State.time.prevTick = State.time.tick;
                State.time.tick = tick;
            });

            Network.on("global", State.setGlobal);

            Network.on("players", players => {

                players.forEach(player => {

                    if (player.drop === true
                        || (player.team !== undefined
                            && player.team !== 1
                            && player.team !== 2)
                    ) {
                        State.removePlayer(player.id);
                        return;
                    }

                    State.upsertPlayer(player.id, player);
                });
            });

            Network.on("events", events => {

                events.forEach(event => {

                    switch (event.type) {

                        case Consts.EVENT_TYPE.ROUND_ENDED:
                            break;

                        case Consts.EVENT_TYPE.DIED:

                            // k = killer id
                            // v = victim id
                            // w = weapon id
                            // a = assistant id (if any)
                            // r = rarity
                            let killer = State.players[event.k];
                            let victim = State.players[event.v];
                            let assistant = event.a ? State.players[event.a] : null;

                            // icon is the name of the weapon.
                            let weapon = Consts.WEAPONS[event.w];

                            const killEvent = {
                                killerId: event.k,
                                victimId: event.v,
                                assistantId: event.a || null,

                                killerName: killer?.name ?? "Unknown",
                                victimName: victim?.name ?? "Unknown",
                                assistantName: assistant?.name ?? null,

                                killerTeam: killer?.team ?? null,
                                victimTeam: victim?.team ?? null,
                                assistantTeam: assistant?.team ?? null,

                                weapon,

                                rarity: event.r
                            };

                            // If killer == victim && weapon == none -> worldspawn/slay/kill
                            if (killer !== victim || weapon.name)
                                Chat.addKill(killEvent);
                            else
                                Chat.addDeath(killer.name, killer.team);

                            break;

                        case Consts.EVENT_TYPE.BOMB_PLANTING:
                            Chat.addBombPlanting(State.players[event.i]?.name);
                            break;

                        case Consts.EVENT_TYPE.BOMB_PLANT_ABORTED:
                            Logger.log("[BOMB PLANT ABORTED]", event);
                            Chat.addBombPlantAborted(State.players[event.i]?.name);
                            break;

                        case Consts.EVENT_TYPE.BOMB_PLANTED:
                            // i = id of planter
                            // x,y,z = coords
                            // t = time left to explode counting from this packet tick (State.tick).                            
                            const gameNow = GameNowTick(State.time.tick, State.time.receivedAt);
                            State.startC4Timer(event.t - (gameNow - State.time.tick));
                            RadarUI.c4DroppedAt(event.x, event.y, event.z, true);
                            Chat.addBombPlanted(State.players[event.i]?.name);
                            break;

                        case Consts.EVENT_TYPE.BOMB_DROPPED:
                            RadarUI.c4DroppedAt(event.x, event.y, event.z);
                            Chat.addBombDrop(State.players[event.i]?.name);
                            break;

                        case Consts.EVENT_TYPE.BOMB_PICKED_UP:
                            Chat.addBombPickedUp(State.players[event.i]?.name, event.s);
                            break;

                        case Consts.EVENT_TYPE.BOMB_DEFUSING:
                            Chat.addBombDefusing(State.players[event.i]?.name);
                            break;

                        case Consts.EVENT_TYPE.BOMB_DEFUSE_ABORTED:
                            Chat.addBombDefuseAborted(State.players[event.i]?.name);
                            break;

                        case Consts.EVENT_TYPE.BOMB_DEFUSED:
                            Chat.addBombDefused(State.players[event.i]?.name);
                            break;

                        case Consts.EVENT_TYPE.BOMB_EXPLODED:
                            // p = planter id; d = defuser id, if any.
                            //State.c4Exploded();

                            if (!event.d)
                                Chat.addBombExploded(State.players[event.p]?.name);
                            else
                                Chat.addBombExploded(
                                    State.players[event.p]?.name,
                                    State.players[event.d]?.name);
                            break;

                        case Consts.EVENT_TYPE.FLASHED:
                            // v - flashed id (victim)
                            // a - flash thrower (attacker)
                            // f - fade time in seconds
                            // h - hold time in seconds
                            // t - tick when it happened
                            const plFlashed = State.players[event.v];
                            const plThrower = State.players[event.a];

                            if (!plFlashed)
                                break;

                            const now = GameNowTick(State.time.tick, State.time.receivedAt);
                            const elapsed = now - event.t;
                            const holdLeft = Math.max(0, event.h - elapsed);
                            const fadeElapsed = Math.max(0, elapsed - event.h);
                            const fadeLeft = Math.max(0, event.f - fadeElapsed);

                            if (holdLeft <= 0 && fadeLeft <= 0)
                                break;
                            
                            PlayersUI.blinded(plFlashed.id, holdLeft, event.f);

                            Chat.addPlayerFlashed(plFlashed.name, plFlashed.team, plThrower?.name, plThrower?.team);

                            break;

                        default:
                            Logger.log("[EVENT]", event);
                    }
                });
            });

            // STATE SETUP

            State.on("roundEndTimeChanged", (timeLeftSeconds) => {
                Logger.log(`Round end time changed: time left is now ${timeLeftSeconds} seconds`);
                ScoreboardUI.renderRoundTime(timeLeftSeconds);
            });

            State.on("scoreChanged", ({ t, ct }) => {
                ScoreboardUI.setScore(t, ct);
            });

            State.on("overviewChanged", mapName => {
                Logger.log(`Map changed and overview is ready to be used: ${mapName}`);

                const overview = State.radar.overview;

                if (overview) {
                    RadarUI.setOverview(overview);
                } else {
                    Logger.warn("Received overview change event but overview data is not set");
                }
            });

            State.on("playerUpdated", ({ player, delta }) => {
                PlayersUI.upsert(player, delta);
            });

            State.on("playerRemoved", id => {
                PlayersUI.remove(id);
            });

            const _updateRoundTime = (() => {
                let lastRenderedRoundTime = -1;

                return function () {
                    const timeLeft = State.getRoundTimeLeft();

                    if (timeLeft !== lastRenderedRoundTime) {
                        ScoreboardUI.renderRoundTime(timeLeft);
                        lastRenderedRoundTime = timeLeft;
                    }
                };
            })();

            const updateC4Timer = (() => {

                let left = null;

                return function (now, delta) {

                    if (!State.c4Running())
                        return;

                    if (left === null) {
                        ScoreboardUI.showC4Timer();
                    }

                    const elapsed = (now - State.c4StartedAt()) / 1000;
                    left = State.c4TimeLeft() - elapsed;

                    if (left <= 0) {
                        left = null;
                        State.c4Exploded();
                        ScoreboardUI.hideC4Timer();
                    }
                    else {                        
                        ScoreboardUI.setC4TimeLeft(left);
                    }
                }

            })();

            const reFrame = (() => {

                let lastTime = 0;

                return function (now) {

                    // For max delta to 100 ms.
                    const timeSinceLast =
                        Math.min(
                            (now - lastTime) / 1000,
                            0.1);

                    lastTime = now;

                    RadarUI.redraw();
                    RadarUI.drawPlayers(State.players, timeSinceLast);
                    
                    updateC4Timer(now, timeSinceLast);
                    _updateRoundTime();

                    requestAnimationFrame(reFrame);
                };
            })();
        
            Network.connect();

        })().catch(console.error);
    </script>

    <!-- UI STUFF, DRAGGABLES, ETC -->
    <script>
        /* =========================
           GLOBAL STATE
        ========================= */

        const uiGrid = document.getElementById("ui-grid");
        const rowResizer = document.getElementById("row-resizer");

        const chatGrid = document.getElementById("chat-grid");
        const colResizers = document.querySelectorAll(".col-resizer");

        let isDraggingRow = false;
        let isDraggingCol = false;

        /* =========================
           ROW RESIZING
        ========================= */

        let startY;
        let startTopHeight;
        let contentHeight;

        let paddingTop;
        let paddingBottom;

        rowResizer.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            isDraggingRow = true;

            const gridRect = uiGrid.getBoundingClientRect();
            const resizerRect = rowResizer.getBoundingClientRect();

            const styles = getComputedStyle(uiGrid);
            paddingTop = parseFloat(styles.paddingTop);
            paddingBottom = parseFloat(styles.paddingBottom);

            contentHeight = gridRect.height - paddingTop - paddingBottom;

            startTopHeight = resizerRect.top - gridRect.top - paddingTop;
            startY = e.clientY;

            document.body.classList.add("resizing", "res-row");

            rowResizer.setPointerCapture(e.pointerId);
        });

        rowResizer.addEventListener("pointermove", (e) => {
            if (!isDraggingRow) return;

            const dy = e.clientY - startY;

            let newTop = startTopHeight + dy;
            let newBottom = contentHeight - newTop - rowResizer.offsetHeight;

            const minTop = 180;
            const minBottom = 160;

            if (newTop < minTop || newBottom < minBottom) return;

            uiGrid.style.gridTemplateRows = `
                                        ${newTop}px
                                        6px
                                        ${newBottom}px
                                    `;
        });

        function stopRowResize(e) {
            isDraggingRow = false;
            document.body.classList.remove("resizing", "res-row");
            rowResizer.releasePointerCapture(e.pointerId);
        }

        rowResizer.addEventListener("pointerup", stopRowResize);
        rowResizer.addEventListener("pointercancel", stopRowResize);

        /* =========================
           COLUMN RESIZING
        ========================= */

        let startX;
        let startWidths;
        let activeResizerIndex = null;

        colResizers.forEach((resizer, index) => {
            resizer.addEventListener("pointerdown", (e) => {
                e.preventDefault();
                isDraggingCol = true;
                startX = e.clientX;

                const cols = getComputedStyle(chatGrid).gridTemplateColumns.split(" ");

                startWidths = [
                    parseFloat(cols[0]),
                    parseFloat(cols[2]),
                    parseFloat(cols[4])
                ];

                activeResizerIndex = index;

                document.body.classList.add("resizing", "res-col");
                resizer.setPointerCapture(e.pointerId);
            });

            resizer.addEventListener("pointermove", (e) => {
                if (!isDraggingCol) return;

                const dx = e.clientX - startX;
                const index = activeResizerIndex;

                let left = startWidths[index] + dx;
                let right = startWidths[index + 1] - dx;

                const min = 80;

                if (left < min || right < min) return;

                const newWidths = [...startWidths];
                newWidths[index] = left;
                newWidths[index + 1] = right;

                chatGrid.style.gridTemplateColumns = `
                                        ${newWidths[0]}px 6px
                                        ${newWidths[1]}px 6px
                                        ${newWidths[2]}px
                                    `;
            });

            resizer.addEventListener("pointerup", (e) => {
                isDraggingCol = false;

                activeResizerIndex = null;

                document.body.classList.remove("resizing", "res-col");
                resizer.releasePointerCapture(e.pointerId);
            });

            resizer.addEventListener("pointercancel", (e) => {
                isDraggingCol = false;

                activeResizerIndex = null;

                document.body.classList.remove("resizing", "res-col");
                resizer.releasePointerCapture(e.pointerId);
            });
        });

    </script>
